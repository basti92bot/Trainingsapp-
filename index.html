<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RepPilot">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>RepPilot</title>
</head>
<body>
  <header>
    <p>TRAINING</p>
    <h1>RepPilot</h1>
  </header>

  <main>
    <section id="home" class="view active">
      <article class="card hero today-card">
        <div class="today-icon" id="todayIcon">🏋️</div>
        <div class="today-copy">
          <small id="todayLabel">Heute</small>
          <h2 id="nextTitle"></h2>
          <p id="nextMeta"></p>
          <p id="todayHint" class="today-hint"></p>
        </div>
        <button id="startBtn">Training starten</button>
      </article>

      <h2>Wochenplan</h2>
      <div id="plan"></div>
    </section>

    <section id="workout" class="view">
      <div class="top">
        <div>
          <small id="counter"></small>
          <h2 id="workoutTitle"></h2>
        </div>
        <button id="cancelBtn" class="secondary compact">Abbrechen</button>
      </div>

      <div class="track"><div id="bar"></div></div>

      <article id="setPanel" class="card focus">
        <small>AKTUELLE ÜBUNG</small>
        <div class="exercise-title-row"><div id="exerciseIcon" class="exercise-icon-large"></div><h2 id="exerciseName"></h2></div>
        <div class="technique-tip"><span aria-hidden="true">💡</span><p id="exerciseTip"></p></div>
        <div class="set-heading">
          <span id="setCounter"></span>
          <strong id="fixedReps"></strong>
        </div>
        <p id="previousSet" class="previous-set" hidden></p>
        <div id="lastTraining" class="last-training" hidden>
          <div>
            <small>LETZTES TRAINING</small>
            <strong id="lastWeightValue"></strong>
          </div>
          <div class="last-training-date">
            <span id="lastWeightDate"></span>
            <small>Automatisch übernommen</small>
          </div>
        </div>
        <label class="weight-label" for="weightInput">Gewicht</label>
        <div class="weight-entry">
          <input id="weightInput" type="number" inputmode="decimal" min="0" step="0.5" aria-label="Gewicht in Kilogramm">
          <span>kg</span>
        </div>
        <button id="completeSetBtn" class="primary-large">Satz abschließen</button>
      </article>

      <article id="restPanel" class="card rest-card" hidden>
        <small>PAUSE</small>
        <h2>Durchatmen</h2>
        <div id="restClock" class="rest-clock" role="timer" aria-live="polite">
          <strong id="restTime">01:30</strong>
          <span>Minuten</span>
        </div>
        <p id="restSetSummary" class="rest-set-summary"></p>
        <p id="restNext" class="rest-next"></p>
        <div class="rest-actions">
          <button id="addRestBtn" class="secondary">+30 Sekunden</button>
          <button id="skipRestBtn">Pause überspringen</button>
        </div>
      </article>

      <article id="completePanel" class="card complete-card" hidden>
        <div class="checkmark">✓</div>
        <div id="completedExerciseIcon" class="exercise-icon-complete"></div>
        <small>ÜBUNG ABGESCHLOSSEN</small>
        <h2 id="completedExercise"></h2>
        <p id="exerciseSummary"></p>

        <div id="nextExerciseBlock">
          <div class="next-exercise">
            <small>NÄCHSTE ÜBUNG</small>
            <div class="next-title-row"><div id="nextExerciseIcon" class="exercise-icon-next"></div><h3 id="nextExerciseName"></h3></div>
            <p id="nextExerciseMeta"></p>
            <div class="next-technique-tip"><span aria-hidden="true">💡</span><p id="nextExerciseTip"></p></div>
          </div>
          <button id="startNextBtn" class="primary-large">Nächste Übung starten</button>
          <button id="skipNextBtn" class="secondary full">Gerät besetzt – überspringen</button>
        </div>

        <div id="finishWorkoutBlock" hidden>
          <div class="workout-total">
            <small>TRAINING ERLEDIGT</small>
            <strong id="workoutVolumePreview"></strong>
          </div>
          <button id="finishWorkoutBtn" class="primary-large">Training speichern</button>
        </div>
      </article>
    </section>

    <section id="run" class="view">
      <div class="top">
        <div>
          <small>LAUFTRAINING</small>
          <h2 id="runTitle"></h2>
        </div>
        <button id="closeRunBtn" class="secondary compact">Zurück</button>
      </div>
      <article class="card run-card">
        <p id="runMeta" class="run-meta"></p>
        <p id="runIntro"></p>
        <div id="runSteps" class="run-steps"></div>
        <p id="runNote" class="run-note"></p>
      </article>
    </section>

    <section id="history" class="view">
      <h2>Verlauf</h2>
      <div id="historyList"></div>
    </section>
  </main>

  <nav>
    <button data-view="home" class="active">Heute</button>
    <button data-view="history">Verlauf</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
